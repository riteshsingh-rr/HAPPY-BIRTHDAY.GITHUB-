<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  overflow:hidden;
}

/* Animated Stars Background */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 50px 50px;
  animation: moveStars 60s linear infinite;
  opacity:0.15;
}

@keyframes moveStars{
  from{transform:translate(0,0);}
  to{transform:translate(-500px,-500px);}
}

/* Main Card */
.card{
  position:relative;
  padding:50px;
  width:380px;
  text-align:center;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(255,105,180,0.4);
  color:white;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  font-size:32px;
  margin-bottom:15px;
  color:#ff9ecf;
}

.name{
  font-size:26px;
  font-weight:bold;
  color:#ffffff;
  margin-bottom:15px;
}

p{
  font-size:16px;
  line-height:1.6;
  color:#ddd;
}

/* Heart Animation */
.heart{
  font-size:40px;
  margin:20px 0;
  animation: beat 1s infinite;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* Button */
.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4e9b;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.4s;
}

.btn:hover{
  background:white;
  color:#ff4e9b;
  box-shadow:0 0 20px #ff4e9b;
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">
  <h1>Happy Birthday 🎂</h1>

  <!-- YAHAN APNI CRUSH KA NAAM LIKHNA -->
  <div class="name">RIDDHI ❤️</div>

  <p>
    On this special day, I just want to say that  
    your smile makes everything brighter.  
    May your life be filled with happiness,love 
    and dreams that come true ✨I LOVE YOU SO MUCH ❤️ 
  </p>

  <div class="heart">💖</div>

  <button class="btn">You’re Special 🌸</button>
</div>

</body>
</html>
